<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNCF Live — Circulations en temps réel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E30613; --dark:#0A0A0F; --panel:#111118; --card:#18181F;
  --border:rgba(255,255,255,0.07); --text:#F0EEE8; --muted:#6B6B7A;
  --green:#00E676; --orange:#FF9800; --blue:#2196F3; --grey:#555;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);display:flex;flex-direction:column;}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;background:var(--panel);border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-badge{background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;padding:3px 9px;border-radius:4px;}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.5);}50%{box-shadow:0 0 0 5px rgba(0,230,118,0);}}
.search-wrap{flex:1;max-width:420px;position:relative;}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 38px 8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:rgba(227,6,19,.4);}
.search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;z-index:2000;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6);max-height:320px;overflow-y:auto;}
.search-dd.open{display:block;}
.dd-item{padding:10px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .15s;}
.dd-item:last-child{border-bottom:none;}
.dd-item:hover{background:rgba(255,255,255,.04);}
.dd-tag{font-family:'DM Mono',monospace;font-size:10px;padding:1px 6px;border-radius:3px;flex-shrink:0;}
.tag-tgv{background:rgba(227,6,19,.15);color:#FF6B6B;border:1px solid rgba(227,6,19,.3);}
.tag-ter{background:rgba(0,119,200,.15);color:#64B5F6;border:1px solid rgba(0,119,200,.3);}
.tag-ic{background:rgba(255,152,0,.15);color:#FFB74D;border:1px solid rgba(255,152,0,.3);}
.dd-info{flex:1;min-width:0;}
.dd-num{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;}
.dd-route{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.filters{display:flex;gap:5px;margin-left:auto;flex-shrink:0;}
.chip{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;transition:all .2s;}
.chip.active,.chip:hover{background:var(--red);border-color:var(--red);color:#fff;}

/* ── LAYOUT ── */
.app-body{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── SIDEBAR ── */
.sidebar{width:320px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sb-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--muted);}
.count-badge{font-family:'DM Mono',monospace;font-size:11px;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--muted);}
.banner{display:none;margin:8px 10px;padding:8px 12px;border-radius:6px;font-size:12px;line-height:1.6;border:1px solid;}
.banner.show{display:block;}
.banner.alert{background:rgba(227,6,19,.1);border-color:rgba(227,6,19,.3);color:#FF8A80;}
.banner.warn{background:rgba(255,152,0,.1);border-color:rgba(255,152,0,.3);color:#FFB74D;}
.trains-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.t-card{padding:11px 18px 11px 21px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.t-card:hover{background:rgba(255,255,255,.025);}
.t-card.selected{background:rgba(227,6,19,.07);}
.t-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;}
.t-card.ok::before{background:var(--green);}
.t-card.late::before{background:var(--orange);}
.t-card.alert::before{background:var(--red);}
.t-card.mod::before{background:var(--blue);}
.t-card.cancel::before{background:var(--grey);}
.tc-top{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.tc-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;}
.tc-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:1px 5px;border-radius:3px;}
.tc-delay{font-family:'DM Mono',monospace;font-size:11px;margin-left:auto;}
.tc-route{font-size:12px;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc-route strong{color:var(--text);}
.tc-times{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.tc-times .late{color:var(--orange);}

/* ── MAP ── */
#map-container{flex:1;position:relative;}
#map{width:100%;height:100%;}
.status-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(17,17,24,.92);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--muted);z-index:800;pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:7px;backdrop-filter:blur(8px);}
.legend{position:absolute;bottom:46px;right:12px;background:rgba(17,17,24,.92);border:1px solid var(--border);border-radius:8px;padding:10px 13px;z-index:800;font-size:11px;backdrop-filter:blur(8px);}
.legend-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--muted);margin-bottom:7px;}
.legend-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── DETAIL PANEL ── */
.detail{position:absolute;right:0;top:0;bottom:0;width:330px;background:var(--panel);border-left:1px solid var(--border);z-index:900;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.detail.open{transform:none;}
.detail-head{padding:18px 18px 0;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
.det-close{position:absolute;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:3px 8px;font-size:12px;line-height:1.4;transition:color .15s;}
.det-close:hover{color:var(--text);}
.det-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1;margin-bottom:3px;}
.det-route{font-size:13px;color:var(--muted);margin-bottom:8px;}
.det-route strong{color:var(--text);}
.det-meta{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px;}
.meta-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted);}
.detail-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.stops-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1.5px;color:var(--muted);padding:12px 18px 8px;}

/* ── STOPS LIST ── */
.stop-row{display:flex;gap:12px;padding:6px 18px;align-items:flex-start;}
.stop-row.is-current{background:rgba(0,230,118,.04);}
.stop-tl{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:14px;padding-top:4px;}
.stop-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .3s;}
.stop-dot.done{background:rgba(107,107,122,.4);border:2px solid rgba(107,107,122,.3);}
.stop-dot.current{background:var(--green);box-shadow:0 0 0 3px rgba(0,230,118,.25),0 0 10px rgba(0,230,118,.4);width:12px;height:12px;}
.stop-dot.next{background:var(--card);border:2px solid var(--muted);}
.stop-dot.skip{background:#1a1a1a;border:2px solid #2a2a2a;}
.stop-line{width:1px;flex:1;min-height:14px;margin-top:2px;transition:background .3s;}
.stop-line.done{background:rgba(107,107,122,.3);}
.stop-line.ahead{background:var(--border);}
.stop-line.current{background:linear-gradient(to bottom, var(--green), var(--border));}
.stop-info{flex:1;padding-bottom:2px;}
.stop-name{font-size:13px;font-weight:500;margin-bottom:3px;}
.stop-name.done{color:var(--muted);font-weight:400;}
.stop-name.current{color:var(--green);font-weight:600;}
.stop-name.skip{color:#333;text-decoration:line-through;}
.stop-sub{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.st{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.st.late{color:var(--orange);font-weight:600;}
.st.time{color:var(--muted);}
.dwell{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:3px;padding:0 5px;}
.dwell.current{color:var(--green);border-color:rgba(0,230,118,.3);}
.mini-skip{font-size:9px;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:2px;background:rgba(80,80,80,.2);color:#555;}
.mini-add{font-size:9px;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:2px;background:rgba(33,150,243,.15);color:var(--blue);}

/* ── ALERTES DANS LE DÉTAIL ── */
.alert-section{padding:10px 18px 4px;}
.alert-section-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
.alert-card{padding:10px 12px;border-radius:6px;margin-bottom:6px;border-left:3px solid;}
.alert-card.blocking{background:rgba(227,6,19,.08);border-color:var(--red);}
.alert-card.significant{background:rgba(255,152,0,.08);border-color:var(--orange);}
.alert-card.info{background:rgba(33,150,243,.08);border-color:var(--blue);}
.alert-cause{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.alert-card.blocking   .alert-cause{color:#FF8A80;}
.alert-card.significant .alert-cause{color:#FFB74D;}
.alert-card.info       .alert-cause{color:#90CAF9;}
.alert-text{font-size:12px;color:var(--muted);line-height:1.5;}
.current-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--green);letter-spacing:.3px;text-transform:uppercase;}
.current-badge::before{content:'';display:inline-block;width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}

/* ── STATES ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--muted);}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:30px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;}
.err-box{margin:10px;padding:12px 14px;background:rgba(227,6,19,.07);border:1px solid rgba(227,6,19,.2);border-radius:8px;font-size:12px;color:#FF8A80;line-height:1.7;}
.err-box strong{display:block;margin-bottom:3px;font-size:13px;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── LEAFLET OVERRIDES ── */
.leaflet-popup-content-wrapper{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.leaflet-popup-tip{background:var(--card);}
.leaflet-popup-content{margin:10px 14px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">SNCF</span>
    <span class="logo-title">LIVE</span>
    <div class="live-dot"></div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="Numéro de train, ville de départ ou d'arrivée…" autocomplete="off">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <div class="search-dd" id="searchDd"></div>
  </div>
  <div class="filters">
    <button class="chip active" data-f="all"  onclick="setFilter('all')">Tous</button>
    <button class="chip"        data-f="TGV"  onclick="setFilter('TGV')">TGV</button>
    <button class="chip"        data-f="TER"  onclick="setFilter('TER')">TER</button>
    <button class="chip"        data-f="IC"   onclick="setFilter('IC')">IC</button>
    <button class="chip"        data-f="late" onclick="setFilter('late')">⚠ Perturbés</button>
  </div>
</header>

<div class="app-body">
  <div class="sidebar">
    <div class="sb-head">
      <span class="sb-title">Circulations du jour</span>
      <span class="count-badge" id="countBadge">…</span>
    </div>
    <div class="banner" id="banner"></div>
    <div class="trains-list" id="trainsList">
      <div class="loader"><div class="spin"></div><span>Chargement…</span></div>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div class="status-bar" id="statusBar">
      <div class="live-dot" style="animation-duration:3s"></div><span>Initialisation…</span>
    </div>
    <div class="legend">
      <div class="legend-title">Statut</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--green)"></div>À l'heure</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--orange)"></div>Retard</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--red)"></div>Retard important</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--blue)"></div>Service modifié</div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="detail" id="detailPanel">
      <div class="detail-head">
        <button class="det-close" onclick="closeDetail()">✕ fermer</button>
        <div class="det-num" id="detNum"></div>
        <div class="det-route" id="detRoute"></div>
        <div class="det-meta" id="detMeta"></div>
      </div>
      <div class="detail-body" id="detBody"></div>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://sncf-poxy-live.onrender.com';
const REFRESH_MS = 60000;

let map, allTrains = [], allAlerts = [], markers = {}, routeLayers = [], selId = null, activeFilter = 'all';
let searchTimer = null;

// ══════════════════════════════════════════════════════
// CARTE — tuiles en français (OpenStreetMap France)
// ══════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { center:[46.8, 2.3], zoom:6, zoomControl:false });
  L.control.zoom({ position:'bottomright' }).addTo(map);

  // Fond sombre CartoDB sans labels
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom:19, subdomains:'abcd',
    attribution:'&copy; <a href="https://carto.com">CARTO</a> &copy; <a href="https://www.openstreetmap.org">OSM</a>'
  }).addTo(map);

  // Labels CartoDB dark_only_labels — noms issus d'OSM (français pour la France)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    maxZoom:19, subdomains:'abcd'
  }).addTo(map);

  map.on('click', closeDetail);
}

// ══════════════════════════════════════════════════════
// INTERPOLATION DE POSITION
// Calcule la position du train à l'instant T entre
// deux gares consécutives, en tenant compte des retards.
// ══════════════════════════════════════════════════════
function interpolatePosition(train) {
  const stops = (train.stops || []).filter(s =>
    s.lat && s.lon && s.scheduleRelationship !== 'SKIPPED'
  );
  if (stops.length === 0) return null;
  if (stops.length === 1) return { lat: stops[0].lat, lon: stops[0].lon, bearing: 0, segIdx: 0 };

  const now = Date.now();

  // Pour chaque segment, on cherche si le train est entre deux gares
  for (let i = 0; i < stops.length - 1; i++) {
    const curr = stops[i];
    const next = stops[i + 1];

    // Heure de départ de curr (avec retard) et d'arrivée à next
    const depTime = getStopTime(curr, 'departure') || getStopTime(curr, 'arrival');
    const arrTime = getStopTime(next, 'arrival')   || getStopTime(next, 'departure');

    if (!depTime || !arrTime) continue;

    const dep = depTime.getTime();
    const arr = arrTime.getTime();

    if (now >= dep && now <= arr) {
      // Interpolation linéaire entre les deux gares
      const t = (now - dep) / (arr - dep); // 0..1
      const lat = curr.lat + (next.lat - curr.lat) * t;
      const lon = curr.lon + (next.lon - curr.lon) * t;
      const bearing = calcBearing(curr.lat, curr.lon, next.lat, next.lon);
      return { lat, lon, bearing, segIdx: i };
    }

    // Avant le départ du premier arrêt → on place sur le 1er arrêt
    if (i === 0 && now < dep) {
      return { lat: curr.lat, lon: curr.lon, bearing: calcBearing(curr.lat, curr.lon, next.lat, next.lon), segIdx: 0 };
    }
  }

  // Après le dernier arrêt → dernière gare
  const last = stops[stops.length - 1];
  const prev = stops[stops.length - 2];
  return { lat: last.lat, lon: last.lon, bearing: calcBearing(prev.lat, prev.lon, last.lat, last.lon), segIdx: stops.length - 1 };
}

function getStopTime(stop, kind) {
  // Prend l'heure réelle (avec retard) si disponible, sinon l'heure prévue
  const t = stop[kind]?.time;
  if (!t) return null;
  try { return new Date(t); } catch { return null; }
}

// Calcule le cap (bearing) entre deux points GPS, en degrés
function calcBearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const dLon  = toRad(lon2 - lon1);
  const y     = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x     = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2))
              - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

// ══════════════════════════════════════════════════════
// ICÔNE TRAIN — forme TGV vue du dessus
// Rectangle à bords arrondis + pointe triangulaire avant
// Orienté selon le bearing (direction de déplacement)
// ══════════════════════════════════════════════════════
function trainIcon(train, bearing, color, glow) {
  const lbl = { TGV:'TGV', TER:'TER', IC:'IC' }[train.type] || train.type;

  // La forme : pointe en haut (nord = 0°), rotée selon bearing
  // Largeur 14px, longueur 28px + pointe 6px = 34px total
  // Centré sur (22,22) dans un viewBox 44x44
  const shape = `
    M 22,7
    L 29,13
    Q 30,13 30,15
    L 30,33
    Q 30,37 26,37
    L 18,37
    Q 14,37 14,33
    L 14,15
    Q 14,13 15,13
    Z
  `;

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
    <g transform="rotate(${bearing}, 22, 22)">
      <path d="${shape}" fill="${color}" opacity="0.95" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
    </g>
    <text x="22" y="25" text-anchor="middle"
          font-family="DM Mono,monospace" font-size="7" font-weight="700"
          fill="white" opacity="0.95" letter-spacing="0.3">${lbl}</text>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize:[44,44], iconAnchor:[22,22] });
}

// ══════════════════════════════════════════════════════
// TRACÉ DE ROUTE
// ══════════════════════════════════════════════════════
function drawRoute(train, color) {
  const stops = (train.stops || []).filter(s =>
    s.lat && s.lon && s.scheduleRelationship !== 'SKIPPED'
  );
  if (stops.length < 2) return;

  const coords = stops.map(s => [s.lat, s.lon]);

  // Ligne de base (grisée, fond)
  const baseLine = L.polyline(coords, {
    color: 'rgba(255,255,255,0.08)',
    weight: 3,
    lineCap: 'round',
    lineJoin: 'round',
  }).addTo(map);

  // Ligne colorée
  const colorLine = L.polyline(coords, {
    color,
    weight: 2.5,
    opacity: 0.7,
    lineCap: 'round',
    lineJoin: 'round',
    dashArray: train.rtStatus === 'MODIFIED_SERVICE' ? '6,4' : null,
  }).addTo(map);

  routeLayers.push(baseLine, colorLine);
}

function clearRoutes() {
  routeLayers.forEach(l => { try { map.removeLayer(l); } catch(e){} });
  routeLayers = [];
}

// ══════════════════════════════════════════════════════
// CHARGEMENT DONNÉES
// ══════════════════════════════════════════════════════
async function loadTrains() {
  setStatus('<span style="display:inline-block;width:9px;height:9px;border:2px solid #333;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle"></span>Actualisation…');
  try {
    const r = await fetch(`${PROXY}/trains`, { signal: AbortSignal.timeout(25000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allTrains = data.trains || [];

    // Chargement alertes en parallèle (silencieux si échec)
    try {
      const ra = await fetch(`${PROXY}/alerts`, { signal: AbortSignal.timeout(10000) });
      const da = await ra.json();
      allAlerts = da.alerts || [];
    } catch(e) { allAlerts = []; }
    render();
    const nb  = allTrains.filter(t => t.rtStatus !== 'NO_DISRUPTION').length;
    const age = data.cacheAgeSec != null ? ` · données ${data.cacheAgeSec}s` : '';
    setStatus(`${allTrains.length} trains · ${nb} perturbés${age} · màj ${hhmm()}`);
  } catch(e) {
    console.error(e);
    setStatus('⚠ Erreur de connexion');
    if (!allTrains.length) {
      document.getElementById('trainsList').innerHTML = `
        <div class="err-box">
          <strong>Serveur injoignable</strong>
          En plan gratuit Render peut prendre <strong>30–60 s</strong> à se réveiller.<br>
          <a href="${PROXY}/health" target="_blank" style="color:var(--red)">→ Tester /health</a>
        </div>`;
    }
  }
}

// ══════════════════════════════════════════════════════
// RENDU
// ══════════════════════════════════════════════════════
function filtered() {
  if (activeFilter === 'late') return allTrains.filter(t => t.delay > 0 || t.rtStatus === 'NO_SERVICE' || t.rtStatus === 'MODIFIED_SERVICE');
  if (activeFilter !== 'all')  return allTrains.filter(t => t.type === activeFilter);
  return allTrains;
}

function render() {
  const list = filtered();
  document.getElementById('countBadge').textContent = list.length;
  renderBanner();
  if (!list.length) {
    document.getElementById('trainsList').innerHTML = `<div class="empty">Aucun train pour ce filtre.</div>`;
    clearMarkers(); return;
  }
  renderCards(list);
  renderMarkers(list);
}

function renderCards(list) {
  document.getElementById('trainsList').innerHTML = list.map(t => {
    const { cls, delayLabel, delayColor } = statusInfo(t);
    const tc   = `tag-${t.type.toLowerCase()}`;
    const dep  = t.fromTime ? fmtISO(t.fromTime) : null;
    const arr  = t.toTime   ? fmtISO(t.toTime)   : null;
    const depD = t.stops?.[0]?.departure?.delay ? Math.round(t.stops[0].departure.delay/60) : 0;
    return `<div class="t-card ${cls}${selId===t.id?' selected':''}" onclick="selectTrain('${t.id}')">
      <div class="tc-top">
        <span class="tc-num">${t.type}&nbsp;${t.num}</span>
        <span class="tc-type ${tc}">${t.type}</span>
        <span class="tc-delay" style="color:${delayColor}">${delayLabel}</span>
      </div>
      <div class="tc-route"><strong>${t.from}</strong> → <strong>${t.to}</strong></div>
      <div class="tc-times">
        ${dep ? `<span class="st">↑&nbsp;${dep}</span>` : ''}
        ${depD > 0 ? `<span class="st late">+${depD}'</span>` : ''}
        ${arr ? `<span class="st">arr.&nbsp;${arr}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderMarkers(list) {
  clearMarkers();
  if (!map) return;
  list.forEach(t => {
    if (t.rtStatus === 'NO_SERVICE') return;
    const pos = interpolatePosition(t);
    if (!pos) return;

    const { color, glow } = mkColor(t);
    const icon = trainIcon(t, pos.bearing, color, glow);
    const m = L.marker([pos.lat, pos.lon], { icon, zIndexOffset: t.delay > 0 ? 100 : 0 }).addTo(map);

    m.bindPopup(`<div style="font-family:'DM Sans',sans-serif;font-size:13px;min-width:150px">
      <b>${t.type} ${t.num}</b><br>
      <span style="color:#888;font-size:12px">${t.from} → ${t.to}</span><br>
      <span style="color:${color}">${t.delay > 0 ? '+'+t.delay+' min' : "À l'heure"}</span>
    </div>`, { closeButton:false });

    m.on('click', e => { e.originalEvent?.stopPropagation(); selectTrain(t.id); });
    markers[t.id] = m;
  });
}

function clearMarkers() {
  if (!map) return;
  Object.values(markers).forEach(m => { try { map.removeLayer(m); } catch(e){} });
  markers = {};
}

// ══════════════════════════════════════════════════════
// BANNIÈRE
// ══════════════════════════════════════════════════════
function renderBanner() {
  const cancel = allTrains.filter(t => t.rtStatus === 'NO_SERVICE').length;
  const big    = allTrains.filter(t => t.delay > 15).length;
  const el = document.getElementById('banner');
  if (!cancel && !big) { el.classList.remove('show'); return; }
  el.className = `banner show ${cancel ? 'alert' : 'warn'}`;
  el.innerHTML = [cancel ? `⛔ ${cancel} supprimé(s)` : '', big ? `⚠ ${big} retard(s) > 15 min` : ''].filter(Boolean).join(' · ');
}

// ══════════════════════════════════════════════════════
// SÉLECTION
// ══════════════════════════════════════════════════════
function selectTrain(id) {
  selId = id;
  document.querySelectorAll('.t-card').forEach(c =>
    c.classList.toggle('selected', c.getAttribute('onclick') === `selectTrain('${id}')`)
  );
  const t = allTrains.find(x => x.id === id);
  if (!t) return;

  // Masque tous les marqueurs sauf le train sélectionné
  Object.entries(markers).forEach(([mid, m]) => {
    if (mid === id) {
      m.setZIndexOffset(1000);
    } else {
      map.removeLayer(m);
    }
  });

  // Tracé de route
  clearRoutes();
  const { color } = mkColor(t);
  drawRoute(t, color);

  // Centrage sur la position interpolée
  const pos = interpolatePosition(t);
  if (map && pos) map.setView([pos.lat, pos.lon], 9, { animate:true });
  else if (map && t.lat && t.lon) map.setView([t.lat, t.lon], 8, { animate:true });

  showDetail(t, pos);
}

// ══════════════════════════════════════════════════════
// PANNEAU DÉTAIL avec stops améliorés
// ══════════════════════════════════════════════════════
function showDetail(t, pos) {
  const { delayLabel, delayColor } = statusInfo(t);
  document.getElementById('detNum').textContent = `${t.type} ${t.num}`;
  document.getElementById('detRoute').innerHTML = `<strong>${t.from}</strong> → <strong>${t.to}</strong>`;
  const rtMap = { NO_DISRUPTION:'✓ Normal', SIGNIFICANT_DELAYS:'⚠ Retardé', MODIFIED_SERVICE:'🔵 Modifié', NO_SERVICE:'⛔ Supprimé' };
  document.getElementById('detMeta').innerHTML = `
    <span class="meta-pill">${t.type}</span>
    <span class="meta-pill" style="color:${delayColor}">${delayLabel}</span>
    ${t.fromTime ? `<span class="meta-pill">↑ ${fmtISO(t.fromTime)}</span>` : ''}
    ${t.toTime   ? `<span class="meta-pill">↓ ${fmtISO(t.toTime)}</span>`   : ''}
    <span class="meta-pill" style="font-size:10px">${rtMap[t.rtStatus]||''}</span>
  `;

  const stops  = t.stops || [];
  const now    = Date.now();

  // ── Alertes liées à ce train ──
  // Le matching est robuste : on compare les IDs partiels car SNCF
  // utilise des formats différents dans trip_updates vs service_alerts
  const trainAlerts = allAlerts.filter(a => {
    if (!a.affected?.length) return false;
    return a.affected.some(e => {
      if (e.tripId && t.tripId) {
        // Comparaison partielle — ex: "OCESN8504F..." contient "8504"
        const short = t.num?.toString();
        if (short && e.tripId.includes(short)) return true;
        if (t.tripId.includes(e.tripId) || e.tripId.includes(t.tripId)) return true;
      }
      if (e.routeId && t.routeId) {
        if (t.routeId === e.routeId) return true;
        if (t.routeId.includes(e.routeId) || e.routeId.includes(t.routeId)) return true;
      }
      return false;
    });
  });

  // Si pas d'alerte matchée mais train retardé/supprimé → alerte synthétique
  const syntheticAlerts = [];
  if (!trainAlerts.length && t.rtStatus !== 'NO_DISRUPTION') {
    if (t.rtStatus === 'NO_SERVICE') {
      syntheticAlerts.push({ severity:'blocking', cause:'OTHER_CAUSE', effect:'NO_SERVICE',
        headerText:'Train supprimé', description:'Ce train est supprimé aujourd\'hui.' });
    } else if (t.rtStatus === 'SIGNIFICANT_DELAYS') {
      syntheticAlerts.push({ severity:'significant', cause:'UNKNOWN_CAUSE', effect:'SIGNIFICANT_DELAYS',
        headerText:`Retard de ${t.delay} minute${t.delay > 1 ? 's' : ''}`,
        description:'Des informations détaillées ne sont pas disponibles pour le moment.' });
    } else if (t.rtStatus === 'MODIFIED_SERVICE') {
      syntheticAlerts.push({ severity:'info', cause:'OTHER_CAUSE', effect:'MODIFIED_SERVICE',
        headerText:'Service modifié', description:'Certains arrêts ont été modifiés sur ce trajet.' });
    }
  }

  const alertsToShow = [...trainAlerts, ...syntheticAlerts];

  const causeLabels = {
    STRIKE:'Grève', TECHNICAL_PROBLEM:'Problème technique', ACCIDENT:'Accident',
    WEATHER:'Conditions météo', MAINTENANCE:'Travaux', CONSTRUCTION:'Travaux',
    POLICE_ACTIVITY:"Intervention des forces de l'ordre", MEDICAL_EMERGENCY:'Urgence médicale',
    DEMONSTRATION:'Manifestation', OTHER_CAUSE:'Autre cause', UNKNOWN_CAUSE:null
  };
  const effectLabels = {
    NO_SERVICE:'Service supprimé', SIGNIFICANT_DELAYS:'Retards importants',
    REDUCED_SERVICE:'Service réduit', MODIFIED_SERVICE:'Service modifié',
    DETOUR:'Déviation', ADDITIONAL_SERVICE:'Service supplémentaire'
  };

  const alertsHTML = alertsToShow.length
    ? `<div class="alert-section">
        <div class="alert-section-title">⚠ Perturbations</div>
        ${alertsToShow.map(a => {
          const cause  = causeLabels[a.cause]  ?? null;
          const effect = effectLabels[a.effect] ?? null;
          const label  = [cause, effect].filter(Boolean).join(' · ');
          const title  = a.headerText || label || 'Perturbation';
          const desc   = a.description && a.description !== a.headerText ? a.description : null;
          return `<div class="alert-card ${a.severity || 'info'}">
            <div class="alert-cause">${label || 'Perturbation'}</div>
            <div class="alert-text">${title}${desc ? '<br><span style="opacity:.75">'+desc+'</span>' : ''}</div>
          </div>`;
        }).join('')}
      </div>`
    : '';

  // Détermine l'index de l'arrêt courant (entre lequel le train circule)
  const currentSegIdx = pos?.segIdx ?? findCurrentSegment(stops, now);

  document.getElementById('detBody').innerHTML = alertsHTML + (stops.length
    ? `<div class="stops-title">Arrêts desservis (${stops.length})</div>`
      + stops.map((s, i) => {
          const skip  = s.scheduleRelationship === 'SKIPPED';
          const added = s.scheduleRelationship === 'ADDED';

          // État dans la progression
          const isCurrent = !skip && i === currentSegIdx;
          const isPassed  = !skip && i < currentSegIdx;

          const dotCls  = skip ? 'skip' : isCurrent ? 'current' : isPassed ? 'done' : 'next';
          const lineCls = i === currentSegIdx ? 'current' : isPassed ? 'done' : 'ahead';
          const nameCls = skip ? 'skip' : isCurrent ? 'current' : isPassed ? 'done' : '';

          // Durée d'arrêt (dwell time)
          const depTime = getStopTime(s, 'departure');
          const arrTime = getStopTime(s, 'arrival');
          let dwellHTML = '';
          if (depTime && arrTime && depTime > arrTime) {
            const dwell = Math.round((depTime - arrTime) / 60000);
            if (dwell > 0) {
              dwellHTML = `<span class="dwell${isCurrent ? ' current' : ''}">${dwell} min</span>`;
            }
          }

          // Retard
          const delay = Math.max(
            s.arrival?.delay  ? Math.round(s.arrival.delay  / 60) : 0,
            s.departure?.delay ? Math.round(s.departure.delay / 60) : 0
          );

          // Heure de passage (arrivée ou départ, selon ce qui existe)
          const passTime = arrTime || depTime;
          const timeStr  = passTime ? fmtISO(passTime.toISOString()) : null;

          let subHTML = '';
          if (skip)        subHTML = `<span class="mini-skip">Arrêt supprimé</span>`;
          else if (added)  subHTML = `<span class="mini-add">+ Ajouté</span>`;
          else {
            if (timeStr)    subHTML += `<span class="st time">${timeStr}</span>`;
            if (delay > 0)  subHTML += `<span class="st late">+${delay}'</span>`;
            if (dwellHTML)  subHTML += dwellHTML;
            if (isCurrent)  subHTML += `<span class="current-badge">En gare</span>`;
          }

          return `<div class="stop-row${isCurrent ? ' is-current' : ''}">
            <div class="stop-tl">
              <div class="stop-dot ${dotCls}"></div>
              ${i < stops.length - 1 ? `<div class="stop-line ${lineCls}"></div>` : ''}
            </div>
            <div class="stop-info">
              <div class="stop-name ${nameCls}">${s.stopName || s.stopId || '?'}</div>
              <div class="stop-sub">${subHTML}</div>
            </div>
          </div>`;
        }).join('')
    : `<div class="empty">Pas de détail d'arrêt disponible.</div>`);

  // Scroll auto vers l'arrêt courant
  document.getElementById('detailPanel').classList.add('open');
  if (currentSegIdx > 0) {
    requestAnimationFrame(() => {
      const rows = document.querySelectorAll('.stop-row');
      if (rows[currentSegIdx]) rows[currentSegIdx].scrollIntoView({ block:'center', behavior:'smooth' });
    });
  }
}

// Trouve le segment courant en fonction de l'heure actuelle
function findCurrentSegment(stops, now) {
  for (let i = 0; i < stops.length - 1; i++) {
    const dep = getStopTime(stops[i], 'departure');
    const arr = getStopTime(stops[i+1], 'arrival');
    if (dep && arr && now >= dep.getTime() && now <= arr.getTime()) return i;
  }
  // Cherche le premier arrêt futur
  for (let i = 0; i < stops.length; i++) {
    const t = getStopTime(stops[i], 'arrival') || getStopTime(stops[i], 'departure');
    if (t && t.getTime() > now) return Math.max(0, i - 1);
  }
  return stops.length - 1;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  clearRoutes();
  selId = null;
  document.querySelectorAll('.t-card.selected').forEach(c => c.classList.remove('selected'));
  // Réaffiche tous les marqueurs
  renderMarkers(filtered());
}

// ══════════════════════════════════════════════════════
// RECHERCHE
// ══════════════════════════════════════════════════════
const si = document.getElementById('searchInput');
const sd = document.getElementById('searchDd');
si.addEventListener('input', e => {
  clearTimeout(searchTimer);
  const v = e.target.value.trim();
  if (!v) { sd.classList.remove('open'); return; }
  searchTimer = setTimeout(() => doSearch(v), 300);
});
si.addEventListener('keydown', e => { if (e.key === 'Escape') sd.classList.remove('open'); });
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) sd.classList.remove('open'); });

async function doSearch(q) {
  try {
    const r = await fetch(`${PROXY}/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    const results = data.results || [];
    if (!results.length) {
      sd.innerHTML = `<div class="dd-item" style="color:var(--muted)">Aucun résultat pour « ${q} »</div>`;
    } else {
      sd.innerHTML = results.slice(0,8).map(t => {
        const { delayColor, delayLabel } = statusInfo(t);
        return `<div class="dd-item" onclick="pickResult('${t.id}')">
          <span class="dd-tag tag-${t.type.toLowerCase()}">${t.type}</span>
          <div class="dd-info">
            <div class="dd-num">${t.type} ${t.num} <span style="color:${delayColor};font-size:11px">${delayLabel}</span></div>
            <div class="dd-route">${t.from} → ${t.to}${t.fromTime ? ' · ↑ '+fmtISO(t.fromTime) : ''}</div>
          </div>
        </div>`;
      }).join('');
    }
    sd.classList.add('open');
  } catch(e) { console.error(e); }
}

function pickResult(id) {
  sd.classList.remove('open');
  si.value = '';
  setFilter('all');
  selectTrain(id);
}

// ══════════════════════════════════════════════════════
// FILTRES
// ══════════════════════════════════════════════════════
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.f === f));
  render();
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function statusInfo(t) {
  if (t.rtStatus === 'NO_SERVICE')       return { cls:'cancel', delayLabel:'Supprimé',        delayColor:'var(--grey)' };
  if (t.delay > 20)                      return { cls:'alert',  delayLabel:'+'+t.delay+' min', delayColor:'var(--red)' };
  if (t.delay > 0)                       return { cls:'late',   delayLabel:'+'+t.delay+' min', delayColor:'var(--orange)' };
  if (t.rtStatus === 'MODIFIED_SERVICE') return { cls:'mod',    delayLabel:'Modifié',          delayColor:'var(--blue)' };
  return                                        { cls:'ok',     delayLabel:"À l'heure",        delayColor:'var(--green)' };
}
function mkColor(t) {
  if (t.delay > 20) return { color:'#E30613', glow:'rgba(227,6,19,.22)' };
  if (t.delay > 0)  return { color:'#FF9800', glow:'rgba(255,152,0,.2)' };
  if (t.rtStatus === 'MODIFIED_SERVICE') return { color:'#2196F3', glow:'rgba(33,150,243,.2)' };
  return { color:'#00E676', glow:'rgba(0,230,118,.15)' };
}
function fmtISO(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }); } catch { return iso; }
}
function hhmm() {
  return new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}
function setStatus(html) {
  document.getElementById('statusBar').innerHTML =
    `<div class="live-dot" style="animation-duration:3s"></div><span>${html}</span>`;
}

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
function boot() {
  initMap();
  loadTrains();
  setInterval(loadTrains, REFRESH_MS);
}
</script>
