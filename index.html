<html lang="fr">

<!-- Manifest inline via blob (pas de fichier séparé nécessaire) -->
<script>
const manifest = {
  name: 'SNCF Live',
  short_name: 'SNCF Live',
  description: 'Circulations SNCF en temps réel',
  start_url: './',
  display: 'standalone',
  background_color: '#0A0A0F',
  theme_color: '#0A0A0F',
  orientation: 'portrait-primary',
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E30613'/><text y='72' x='50' text-anchor='middle' font-size='60'>🚅</text></svg>", sizes: '192x192', type: 'image/svg+xml' },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E30613'/><text y='72' x='50' text-anchor='middle' font-size='60'>🚅</text></svg>", sizes: '512x512', type: 'image/svg+xml' }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const mlink = document.createElement('link');
mlink.rel = 'manifest'; mlink.href = URL.createObjectURL(blob);
document.currentScript.after(mlink);
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E30613; --dark:#0A0A0F; --panel:#111118; --card:#18181F;
  --border:rgba(255,255,255,0.07); --text:#F0EEE8; --muted:#6B6B7A;
  --green:#00E676; --orange:#FF9800; --blue:#2196F3; --grey:#555;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --tab-h: 60px;
  /* Glassmorphisme */
  --glass-bg: rgba(12, 12, 20, 0.70);
  --glass-blur: 20px;
  --glass-sat: 1.5;
  --glass-border: rgba(255,255,255,0.10);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05) inset;
  --panel-gap: 12px;
  --panel-radius: 14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);display:flex;flex-direction:column;}

/* ── HEADER desktop ── */
header{display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;background:rgba(10,10,18,0.70);backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));border-bottom:1px solid var(--glass-border);z-index:1000;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-badge{background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;padding:3px 9px;border-radius:4px;}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.5);}50%{box-shadow:0 0 0 5px rgba(0,230,118,0);}}
.search-wrap{flex:1;max-width:420px;position:relative;}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 38px 8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:rgba(227,6,19,.4);}
.search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;z-index:2000;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6);max-height:320px;overflow-y:auto;}
.search-dd.open{display:block;}
.dd-item{padding:10px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);transition:background .15s;}
.dd-item:last-child{border-bottom:none;}
.dd-item:hover{background:rgba(255,255,255,.04);}
.dd-tag{font-family:'DM Mono',monospace;font-size:10px;padding:1px 6px;border-radius:3px;flex-shrink:0;}
.tag-tgv{background:rgba(227,6,19,.15);color:#FF6B6B;border:1px solid rgba(227,6,19,.3);}
.tag-ter{background:rgba(0,119,200,.15);color:#64B5F6;border:1px solid rgba(0,119,200,.3);}
.tag-ic{background:rgba(255,152,0,.15);color:#FFB74D;border:1px solid rgba(255,152,0,.3);}
.dd-info{flex:1;min-width:0;}
.dd-num{font-family:'DM Mono',monospace;font-weight:500;font-size:13px;}
.dd-route{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.filters{display:flex;gap:5px;margin-left:auto;flex-shrink:0;}
.chip{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;transition:all .2s;}
.chip.active,.chip:hover{background:var(--red);border-color:var(--red);color:#fff;}

/* ── LAYOUT ── */
.app-body{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── SIDEBAR desktop ── */
.sidebar{position:absolute;top:var(--panel-gap);left:var(--panel-gap);bottom:var(--panel-gap);width:300px;z-index:600;flex-shrink:0;background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));border:1px solid var(--glass-border);border-radius:var(--panel-radius);box-shadow:var(--glass-shadow);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sb-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--muted);}
.count-badge{font-family:'DM Mono',monospace;font-size:11px;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--muted);}
.banner{display:none;margin:8px 10px;padding:8px 12px;border-radius:6px;font-size:12px;line-height:1.6;border:1px solid;}
.banner.show{display:block;}
.banner.alert{background:rgba(227,6,19,.1);border-color:rgba(227,6,19,.3);color:#FF8A80;}
.banner.warn{background:rgba(255,152,0,.1);border-color:rgba(255,152,0,.3);color:#FFB74D;}
.trains-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.t-card{padding:11px 18px 11px 21px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.t-card:hover{background:rgba(255,255,255,.025);}
.t-card.selected{background:rgba(227,6,19,.07);}
.t-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;}
.t-card.ok::before{background:var(--green);}
.t-card.late::before{background:var(--orange);}
.t-card.alert::before{background:var(--red);}
.t-card.mod::before{background:var(--blue);}
.t-card.cancel::before{background:var(--grey);}
.tc-top{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.tc-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;}
.tc-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:1px 5px;border-radius:3px;}
.tc-delay{font-family:'DM Mono',monospace;font-size:11px;margin-left:auto;}
.tc-route{font-size:12px;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc-route strong{color:var(--text);}
.tc-times{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.tc-times .late{color:var(--orange);}

/* ── MAP ── */
#map-container{position:absolute;inset:0;}
#map{width:100%;height:100%;}
.status-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(17,17,24,.92);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--muted);z-index:800;pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:7px;backdrop-filter:blur(8px);}
.legend{position:absolute;bottom:46px;right:12px;background:rgba(17,17,24,.92);border:1px solid var(--border);border-radius:8px;padding:10px 13px;z-index:600;font-size:11px;backdrop-filter:blur(8px);}
.legend-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--muted);margin-bottom:7px;}
.legend-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── DETAIL PANEL — desktop ── */
.detail{position:absolute;right:var(--panel-gap);top:var(--panel-gap);bottom:var(--panel-gap);width:330px;background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));border:1px solid var(--glass-border);border-radius:var(--panel-radius);box-shadow:var(--glass-shadow);z-index:600;transform:translateX(calc(100% + var(--panel-gap)));transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.detail.open{transform:translateX(0);}
.detail-head{padding:18px 18px 0;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
.det-close{position:absolute;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:3px 8px;font-size:12px;line-height:1.4;transition:color .15s;}
.det-close:hover{color:var(--text);}
.det-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1;margin-bottom:3px;}
.det-route{font-size:13px;color:var(--muted);margin-bottom:8px;}
.det-route strong{color:var(--text);}
.det-meta{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px;}
.meta-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted);}
.detail-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.stops-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1.5px;color:var(--muted);padding:12px 18px 8px;}

/* ── STOPS LIST — timeline continue ── */
.stops-container{padding:0 0 8px;}
.stop-row{display:flex;gap:0;padding:0 18px;min-height:36px;}
.stop-row.is-current{background:rgba(0,230,118,.04);}
.stop-tl{width:22px;flex-shrink:0;position:relative;display:flex;justify-content:center;}
.stop-tl-bar{position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.stop-tl-bar-fill{position:absolute;top:0;left:0;width:100%;background:var(--green);border-radius:2px;transition:height .3s;}
.stop-row:first-child .stop-tl-bar{top:50%;}
.stop-row:last-child .stop-tl-bar{bottom:50%;}
.stop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;z-index:2;margin-top:14px;transition:all .25s;}
.stop-dot.done   {background:var(--green);opacity:0.7;}
.stop-dot.current{background:var(--green);box-shadow:0 0 0 3px rgba(0,230,118,.3),0 0 8px rgba(0,230,118,.5);width:11px;height:11px;margin-top:12px;}
.stop-dot.next   {background:var(--dark);border:1.5px solid rgba(255,255,255,.25);}
.stop-dot.skip   {background:var(--dark);border:1.5px solid #2a2a2a;opacity:.4;}
.stop-info{flex:1;padding:8px 0 8px 10px;}
.st.struck{text-decoration:line-through;opacity:.38;font-size:10px;}
.st.amended{color:var(--orange);font-weight:600;}
.stop-name{font-size:13px;font-weight:500;margin-bottom:3px;}
.stop-name.done{color:var(--muted);font-weight:400;}
.stop-name.current{color:var(--green);font-weight:600;}
.stop-name.skip{color:#333;text-decoration:line-through;}
.stop-sub{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.st{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.st.late{color:var(--orange);font-weight:600;}
.st.time{color:var(--muted);}
.dwell{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:3px;padding:0 5px;}
.dwell.current{color:var(--green);border-color:rgba(0,230,118,.3);}
.mini-skip{font-size:9px;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:2px;background:rgba(80,80,80,.2);color:#555;}
.mini-add{font-size:9px;font-weight:700;text-transform:uppercase;padding:1px 5px;border-radius:2px;background:rgba(33,150,243,.15);color:var(--blue);}

/* ── ALERTES ACCORDÉON ── */
.alert-section{padding:10px 18px 4px;}
.alert-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 12px;border-radius:6px;background:var(--card);border:1px solid var(--border);margin-bottom:0;user-select:none;transition:background .15s;}
.alert-toggle:hover{background:rgba(255,255,255,.04);}
.alert-toggle-left{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;}
.alert-toggle-count{font-family:'DM Mono',monospace;font-size:10px;background:rgba(255,152,0,.15);color:#FFB74D;border:1px solid rgba(255,152,0,.3);border-radius:3px;padding:1px 6px;}
.alert-toggle-count.blocking{background:rgba(227,6,19,.15);color:#FF8A80;border-color:rgba(227,6,19,.3);}
.alert-chevron{color:var(--muted);font-size:11px;transition:transform .2s;}
.alert-chevron.open{transform:rotate(180deg);}
.alert-body{overflow:hidden;max-height:0;transition:max-height .3s ease;}
.alert-body.open{max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.alert-body.open::-webkit-scrollbar{width:3px;}
.alert-body.open::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.alert-body-inner{padding-top:8px;display:flex;flex-direction:column;gap:6px;}
.alert-preview{font-size:12px;color:var(--muted);padding:6px 12px 2px;line-height:1.4;font-style:italic;}
.alert-card{padding:10px 12px;border-radius:7px;border:1px solid;border-left-width:3px;}
.alert-card.blocking  {background:rgba(227,6,19,.1); border-color:rgba(227,6,19,.35);}
.alert-card.significant{background:rgba(255,152,0,.1);border-color:rgba(255,152,0,.35);}
.alert-card.info      {background:rgba(33,150,243,.08);border-color:rgba(33,150,243,.3);}
.alert-cause{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.alert-card.blocking   .alert-cause{color:#FF8A80;}
.alert-card.significant .alert-cause{color:#FFB74D;}
.alert-card.info       .alert-cause{color:#90CAF9;}
.alert-text{font-size:12px;line-height:1.5;}
.alert-card.blocking   .alert-text{color:rgba(255,200,200,.8);}
.alert-card.significant .alert-text{color:rgba(255,220,180,.8);}
.alert-card.info       .alert-text{color:rgba(180,210,255,.8);}
.current-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--green);letter-spacing:.3px;text-transform:uppercase;}
.current-badge::before{content:'';display:inline-block;width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}

/* ── STATES ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--muted);}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:30px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;}
.err-box{margin:10px;padding:12px 14px;background:rgba(227,6,19,.07);border:1px solid rgba(227,6,19,.2);border-radius:8px;font-size:12px;color:#FF8A80;line-height:1.7;}
.err-box strong{display:block;margin-bottom:3px;font-size:13px;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── LEAFLET OVERRIDES ── */
.leaflet-popup-content-wrapper{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.leaflet-popup-tip{background:var(--card);}
.leaflet-popup-content{margin:10px 14px;}

/* ════════════════════════════════════════════════════
   MOBILE — layout complet en dessous de 768px
   ════════════════════════════════════════════════════ */
@media (max-width: 768px) {

  /* Header mobile — compact */
  header {
    height: 52px;
    padding: 0 14px;
    padding-top: var(--safe-top);
    gap: 10px;
  }
  .logo-title { display: none; }
  .logo-badge { font-size: 14px; padding: 2px 8px; }
  .search-wrap { max-width: none; }
  .filters { display: none; } /* remplacé par tab bar */
  #desktopSearchWrap { display: none; } /* remplacé par l'onglet Recherche */

  /* App body — plein écran */
  .app-body { position: relative; }

  /* Sidebar — cachée sur mobile, remplacée par tab panel */
  .sidebar { display: none; }

  /* Carte — plein écran avec espace pour la tab bar flottante */
  #map-container {
    position: absolute;
    inset: 0;
    bottom: calc(var(--tab-h) + var(--panel-gap) * 2 + var(--safe-bottom));
  }

  /* Status bar — au-dessus de la tab bar */
  .status-bar {
    bottom: calc(var(--tab-h) + var(--panel-gap) * 2 + var(--safe-bottom) - 50px);
    font-size: 10px;
    padding: 4px 8px;
  }

  /* Légende — repositionnée */
  .legend {
    bottom: calc(var(--tab-h) + var(--panel-gap) * 2 + var(--safe-bottom) + 46px);
    right: 10px;
    padding: 8px 11px;
    font-size: 10px;
  }

  /* ── TAB BAR ── */
  .tab-bar {
    display: flex !important;
    position: fixed;
    bottom: var(--panel-gap);
    left: var(--panel-gap);
    right: var(--panel-gap);
    height: var(--tab-h);
    padding-bottom: 0;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    border: 1px solid var(--glass-border);
    border-radius: var(--panel-radius);
    box-shadow: var(--glass-shadow);
    z-index: 1100;
    margin-bottom: var(--safe-bottom);
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: color .15s;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 2px;
  }
  .tab-item.active { color: var(--red);
    background: rgba(227,6,19,0.08);
    border-radius: 10px;
}
  .tab-item svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .tab-item.active svg { stroke: var(--red); }
  .tab-notif {
    position: absolute;
    top: 8px;
    right: calc(50% - 18px);
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    border-radius: 8px;
    padding: 1px 5px;
    min-width: 16px;
    text-align: center;
    line-height: 14px;
  }

  /* ── TAB PANELS ── */
  .mobile-panel {
    display: none;
    position: fixed;
    top: calc(52px + var(--safe-top));
    left: var(--panel-gap);
    right: var(--panel-gap);
    bottom: calc(var(--tab-h) + var(--panel-gap) * 2 + var(--safe-bottom));
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    border: 1px solid var(--glass-border);
    border-radius: var(--panel-radius);
    box-shadow: var(--glass-shadow);
    z-index: 1050;
    flex-direction: column;
    overflow: hidden;
  }
  .mobile-panel.active { display: flex; }

  /* Panel liste — header avec filtres chips horizontaux */
  .mob-list-head {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

    display: flex;

  }
  .mob-filters::-webkit-scrollbar { display: none; }

  /* Panel recherche */

  /* ── BOTTOM SHEET — panneau détail mobile ── */
  .detail {
    position: fixed;
    right: var(--panel-gap);
    left: var(--panel-gap);
    top: auto;
    width: auto;
    bottom: calc(var(--tab-h) + var(--panel-gap) * 2 + var(--safe-bottom));

    transform: translateY(calc(100% + var(--tab-h) + var(--panel-gap) * 2 + var(--safe-bottom)));

  .detail.open {

  /* Poignée de drag */

<script>
const PROXY = 'https://sncf-poxy-live.onrender.com';
const REFRESH_MS = 60000;

let map, allTrains = [], allAlerts = [], markers = {}, routeLayers = [], selId = null, activeFilter = 'all';
let searchTimer = null, mobSearchTimer = null;
let isMobile = () => window.innerWidth <= 768;
let activeTab = 'map';

// ══════════════════════════════════════════════════════
// TAB BAR — navigation mobile
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-item').forEach(el =>
    el.classList.toggle('active', el.id === 'tab-' + tab)
  );
  document.getElementById('mobListPanel').classList.toggle('active', tab === 'list');
  document.getElementById('mobSearchPanel').classList.toggle('active', tab === 'search');

  // Focus auto sur le champ de recherche mobile
  if (tab === 'search') {
    setTimeout(() => document.getElementById('mobSearchInput')?.focus(), 100);
  }
  // Ferme le détail si on change d'onglet
  if (tab !== 'map') closeDetail();
}

// ══════════════════════════════════════════════════════
// BOTTOM SHEET — drag via translateY
// ══════════════════════════════════════════════════════
(function initBottomSheet() {
  let startY = 0, currentTranslate = 0, dragging = false;
  const handle = document.getElementById('detailHandle');
  const panel  = document.getElementById('detailPanel');

  function onStart(e) {
    if (!isMobile()) return;
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    currentTranslate = 0; // panel est open donc translateY(0)
    panel.style.transition = 'none';
  }

  function onMove(e) {
    if (!dragging) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const delta = Math.max(0, y - startY); // seulement vers le bas
    panel.style.transform = `translateY(${delta}px)`;
    // Assombrit l'overlay proportionnellement
    const ratio = 1 - Math.min(delta / (window.innerHeight * 0.4), 1);
    const overlay = document.getElementById('detailOverlay');
    if (overlay) overlay.style.opacity = ratio * 0.5;
    if (e.cancelable) e.preventDefault();
  }

  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const delta = y - startY;
    // Si glissé de plus de 120px vers le bas → ferme
    if (delta > 120) {
      closeDetail();
    } else {
      // Sinon snap retour en position ouverte
      panel.style.transform = 'translateY(0)';
      const overlay = document.getElementById('detailOverlay');
      if (overlay) overlay.style.opacity = '';
    }
  }

  handle.addEventListener('touchstart', onStart, { passive: true });
  handle.addEventListener('touchmove',  onMove,  { passive: false });
  handle.addEventListener('touchend',   onEnd);
  handle.addEventListener('mousedown',  onStart);
  window.addEventListener('mousemove',  onMove);
  window.addEventListener('mouseup',    onEnd);
})();

// ══════════════════════════════════════════════════════
// CARTE
// ══════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { center:[46.8, 2.3], zoom:6, zoomControl:false });
  L.control.zoom({ position:'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom:19, subdomains:'abcd',
    attribution:'&copy; <a href="https://carto.com">CARTO</a> &copy; <a href="https://www.openstreetmap.org">OSM</a>'
  }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    maxZoom:19, subdomains:'abcd'
  }).addTo(map);
  map.on('click', closeDetail);
  initDeck();
}

// ══════════════════════════════════════════════════════
// INTERPOLATION DE POSITION
// ══════════════════════════════════════════════════════
function interpolatePosition(train) {
  const rawStops = train.stops || [];
  const stopsWithCoords = rawStops
    .map((s, rawIdx) => ({ ...s, rawIdx }))
    .filter(s => s.lat && s.lon && s.scheduleRelationship !== 'SKIPPED');

  const now = Date.now();

  if (stopsWithCoords.length === 0) {
    if (train.lat && train.lon) return { lat: train.lat, lon: train.lon, bearing: 0, segIdx: 0 };
    return null;
  }
  if (stopsWithCoords.length === 1) {
    return { lat: stopsWithCoords[0].lat, lon: stopsWithCoords[0].lon, bearing: 0, segIdx: stopsWithCoords[0].rawIdx };
  }

  for (let i = 0; i < stopsWithCoords.length; i++) {
    const curr = stopsWithCoords[i];
    const next = stopsWithCoords[i + 1];
    const arrCurr = getStopTime(curr, 'arrival');
    const depCurr = getStopTime(curr, 'departure') || arrCurr;

    if (arrCurr && depCurr && now >= arrCurr.getTime() && now <= depCurr.getTime()) {
      const bearing = next ? calcBearing(curr.lat, curr.lon, next.lat, next.lon) : 0;
      return { lat: curr.lat, lon: curr.lon, bearing, segIdx: curr.rawIdx };
    }
    if (!next) break;

    const depTime = depCurr;
    const arrNext = getStopTime(next, 'arrival') || getStopTime(next, 'departure');
    if (!depTime || !arrNext) continue;

    const dep = depTime.getTime(), arr = arrNext.getTime();
    if (now >= dep && now <= arr) {
      const t = (now - dep) / (arr - dep);
      return { lat: curr.lat + (next.lat - curr.lat) * t, lon: curr.lon + (next.lon - curr.lon) * t,
               bearing: calcBearing(curr.lat, curr.lon, next.lat, next.lon), segIdx: curr.rawIdx };
    }
    if (i === 0 && now < dep) {
      return { lat: curr.lat, lon: curr.lon, bearing: calcBearing(curr.lat, curr.lon, next.lat, next.lon), segIdx: curr.rawIdx };
    }
  }

  const last = stopsWithCoords[stopsWithCoords.length - 1];
  const prev = stopsWithCoords[stopsWithCoords.length - 2];
  return { lat: last.lat, lon: last.lon, bearing: calcBearing(prev.lat, prev.lon, last.lat, last.lon), segIdx: last.rawIdx };
}

function getStopTime(stop, kind) {
  const t = stop[kind]?.time;
  if (!t) return null;
  try { return new Date(t); } catch { return null; }
}

function calcBearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
}

// ══════════════════════════════════════════════════════
// ICÔNE TRAIN
// ══════════════════════════════════════════════════════
// deck.gl markers — voir bloc DECK.GL ci-dessous

// ══════════════════════════════════════════════════════
// TRACÉ DE ROUTE
// ══════════════════════════════════════════════════════
function drawRoute(train, color) {
  const stops = (train.stops || []).filter(s => s.lat && s.lon && s.scheduleRelationship !== 'SKIPPED');
  if (stops.length < 2) return;
  const coords = stops.map(s => [s.lat, s.lon]);
  const baseLine  = L.polyline(coords, { color:'rgba(255,255,255,0.08)', weight:3, lineCap:'round', lineJoin:'round' }).addTo(map);
  const colorLine = L.polyline(coords, { color, weight:2.5, opacity:0.7, lineCap:'round', lineJoin:'round',
    dashArray: train.rtStatus === 'MODIFIED_SERVICE' ? '6,4' : null }).addTo(map);
  routeLayers.push(baseLine, colorLine);
}

function clearRoutes() {
  routeLayers.forEach(l => { try { map.removeLayer(l); } catch(e){} });
  routeLayers = [];
}

// ══════════════════════════════════════════════════════
// CHARGEMENT DONNÉES
// ══════════════════════════════════════════════════════
async function loadTrains() {
  setStatus('<span style="display:inline-block;width:9px;height:9px;border:2px solid #333;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle"></span>Actualisation…');
  try {
    const r = await fetch(`${PROXY}/trains`, { signal: AbortSignal.timeout(25000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    allTrains = data.trains || [];
    try {
      const ra = await fetch(`${PROXY}/alerts`, { signal: AbortSignal.timeout(10000) });
      const da = await ra.json();
      allAlerts = da.alerts || [];
    } catch(e) { allAlerts = []; }
    render();
    const nb  = allTrains.filter(t => t.rtStatus !== 'NO_DISRUPTION').length;
    const age = data.cacheAgeSec != null ? ` · données ${data.cacheAgeSec}s` : '';
    setStatus(`${allTrains.length} trains · ${nb} perturbés${age} · màj ${hhmm()}`);

    // Badge notif sur l'onglet Trains
    const notif = document.getElementById('tabNotif');
    if (nb > 0) { notif.textContent = nb; notif.style.display = 'block'; }
    else notif.style.display = 'none';

  } catch(e) {
    console.error(e);
    setStatus('⚠ Erreur de connexion');
    if (!allTrains.length) {
      const errHTML = `<div class="err-box"><strong>Serveur injoignable</strong>En plan gratuit Render peut prendre <strong>30–60 s</strong> à se réveiller.<br><a href="${PROXY}/health" target="_blank" style="color:var(--red)">→ Tester /health</a></div>`;
      document.getElementById('trainsList').innerHTML = errHTML;
      document.getElementById('trainsListMob').innerHTML = errHTML;
    }
  }
}

// ══════════════════════════════════════════════════════
// RENDU
// ══════════════════════════════════════════════════════
function isStillRunning(t) {
  if (!t.toTime) return true;
  try { return new Date(t.toTime).getTime() > Date.now(); } catch { return true; }
}
function isInFrance(t) {
  const FR = { latMin:41.3, latMax:51.1, lonMin:-5.2, lonMax:9.6 };
  const inBox = (lat, lon) => lat >= FR.latMin && lat <= FR.latMax && lon >= FR.lonMin && lon <= FR.lonMax;
  const stops = (t.stops || []).filter(s => s.lat && s.lon);
  if (!stops.length) return true;
  return inBox(stops[0].lat, stops[0].lon) && inBox(stops[stops.length-1].lat, stops[stops.length-1].lon);
}
function filtered() {
  const running = allTrains.filter(t => isStillRunning(t) && isInFrance(t));
  if (activeFilter === 'late') return running.filter(t => t.delay > 0 || t.rtStatus === 'NO_SERVICE' || t.rtStatus === 'MODIFIED_SERVICE');
  if (activeFilter !== 'all')  return running.filter(t => t.type === activeFilter);
  return running;
}

function render() {
  const list = filtered();
  document.getElementById('countBadge').textContent    = list.length;
  document.getElementById('countBadgeMob').textContent = list.length;
  renderBanner();
  if (!list.length) {
    const empty = `<div class="empty">Aucun train pour ce filtre.</div>`;
    document.getElementById('trainsList').innerHTML    = empty;
    document.getElementById('trainsListMob').innerHTML = empty;
    clearMarkers(); return;
  }
  renderCards(list);
  renderMarkers(list);
}

function renderCards(list) {
  const html = list.map(t => {
    const { cls, delayLabel, delayColor } = statusInfo(t);
    const tc  = `tag-${t.type.toLowerCase()}`;
    const dep = t.fromTime ? fmtISO(t.fromTime) : null;
    const arr = t.toTime   ? fmtISO(t.toTime)   : null;
    const depD = t.stops?.[0]?.departure?.delay ? Math.round(t.stops[0].departure.delay/60) : 0;
    return `<div class="t-card ${cls}${selId===t.id?' selected':''}" onclick="selectTrain('${t.id}')">
      <div class="tc-top">
        <span class="tc-num">${t.type}&nbsp;${t.num}</span>
        <span class="tc-type ${tc}">${t.brand || t.type}</span>
        <span class="tc-delay" style="color:${delayColor}">${delayLabel}</span>
      </div>
      <div class="tc-route"><strong>${t.from}</strong> → <strong>${t.to}</strong></div>
      <div class="tc-times">
        ${dep ? `<span class="st">Départ:&nbsp;${dep}</span>` : ''}
        ${depD > 0 ? `<span class="st late">+${depD}'</span>` : ''}
        ${arr ? `<span class="st">→ Arrivée:&nbsp;${arr}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('trainsList').innerHTML    = html;
  document.getElementById('trainsListMob').innerHTML = html;
}

function renderMarkers(list) {
  renderDeckMarkers(list);
}

function clearMarkers() {
  clearDeckMarkers();
}

// ══════════════════════════════════════════════════════
// BANNIÈRE
// ══════════════════════════════════════════════════════
function renderBanner() {
  const cancel = allTrains.filter(t => t.rtStatus === 'NO_SERVICE').length;
  const big    = allTrains.filter(t => t.delay > 15).length;
  const show   = cancel || big;
  const cls    = `banner${show?' show':''} ${cancel?'alert':'warn'}`;
  const html   = show ? [cancel ? `⛔ ${cancel} supprimé(s)` : '', big ? `⚠️ ${big} retard(s) > 15 min` : ''].filter(Boolean).join(' · ') : '';
  ['banner','bannerMob'].forEach(id => {
    const el = document.getElementById(id);
    el.className = cls; el.innerHTML = html;
  });
}

// ══════════════════════════════════════════════════════
// SÉLECTION
// ══════════════════════════════════════════════════════
function selectTrain(id) {
  selId = id;
  document.querySelectorAll('.t-card').forEach(c =>
    c.classList.toggle('selected', c.getAttribute('onclick') === `selectTrain('${id}')`)
  );
  const t = allTrains.find(x => x.id === id);
  if (!t) return;

  // Sur mobile : bascule sur l'onglet carte
  if (isMobile()) switchTab('map');

  // deck.gl gère tous les marqueurs — on re-render avec selId mis à jour (taille agrandie)
  renderDeckMarkers(filtered());

  clearRoutes();
  const { color } = mkColor(t);
  drawRoute(t, color);

  const pos = interpolatePosition(t);
  if (map && pos) map.setView([pos.lat, pos.lon], 9, { animate:true });
  else if (map && t.lat && t.lon) map.setView([t.lat, t.lon], 8, { animate:true });

  // Overlay mobile
  if (isMobile()) {
    const overlay = document.getElementById('detailOverlay');
    overlay.classList.add('visible');
    overlay.style.opacity = '';
    const panel = document.getElementById('detailPanel');
    panel.style.transform = '';
  }

  showDetail(t, pos);
}

// ══════════════════════════════════════════════════════
// PANNEAU DÉTAIL
// ══════════════════════════════════════════════════════
function showDetail(t, pos) {
  const { delayLabel, delayColor } = statusInfo(t);
  document.getElementById('detNum').textContent = `${t.type} ${t.num}`;
  document.getElementById('detRoute').innerHTML = `${t.brand ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px">${t.brand}</span>` : ''}<strong>${t.from}</strong> → <strong>${t.to}</strong>`;
  const rtMap = { NO_DISRUPTION:'✓ Normal', SIGNIFICANT_DELAYS:'⚠️ Retardé', MODIFIED_SERVICE:'🔵 Modifié', NO_SERVICE:'⛔ Supprimé' };
  document.getElementById('detMeta').innerHTML = `
    <span class="meta-pill">${t.brand || t.type}</span>
    <span class="meta-pill" style="color:${delayColor}">${delayLabel}</span>
    ${t.fromTime ? `<span class="meta-pill">Départ: ${fmtISO(t.fromTime)}</span>` : ''}
    ${t.toTime   ? `<span class="meta-pill">Arrivée: ${fmtISO(t.toTime)}</span>`   : ''}
    <span class="meta-pill" style="font-size:10px">${rtMap[t.rtStatus]||''}</span>
  `;

  const stops = t.stops || [];
  const now   = Date.now();

  const trainAlerts = allAlerts.filter(a => {
    if (!a.affected?.length) return false;
    return a.affected.some(e => {
      if (e.tripId && t.tripId) {
        const short = t.num?.toString();
        if (short && e.tripId.includes(short)) return true;
        if (t.tripId.includes(e.tripId) || e.tripId.includes(t.tripId)) return true;
      }
      if (e.routeId && t.routeId) {
        if (t.routeId === e.routeId) return true;
        if (t.routeId.includes(e.routeId) || e.routeId.includes(t.routeId)) return true;
      }
      return false;
    });
  });

  const syntheticAlerts = [];
  if (!trainAlerts.length && t.rtStatus !== 'NO_DISRUPTION') {
    if (t.rtStatus === 'NO_SERVICE')
      syntheticAlerts.push({ severity:'blocking', cause:'OTHER_CAUSE', effect:'NO_SERVICE', headerText:'Train supprimé', description:"Ce train est supprimé aujourd'hui." });
    else if (t.rtStatus === 'SIGNIFICANT_DELAYS')
      syntheticAlerts.push({ severity:'significant', cause:'UNKNOWN_CAUSE', effect:'SIGNIFICANT_DELAYS', headerText:`Retard de ${t.delay} minute${t.delay>1?'s':''}`, description:'Des informations détaillées ne sont pas disponibles pour le moment.' });
    else if (t.rtStatus === 'MODIFIED_SERVICE')
      syntheticAlerts.push({ severity:'info', cause:'OTHER_CAUSE', effect:'MODIFIED_SERVICE', headerText:'Service modifié', description:'Certains arrêts ont été modifiés sur ce trajet.' });
  }

  const alertsToShow = [...trainAlerts, ...syntheticAlerts];
  const causeLabels = { STRIKE:'Grève', TECHNICAL_PROBLEM:'Problème technique', ACCIDENT:'Accident', WEATHER:'Conditions météo', MAINTENANCE:'Travaux', CONSTRUCTION:'Travaux', POLICE_ACTIVITY:"Intervention des forces de l'ordre", MEDICAL_EMERGENCY:'Urgence médicale', DEMONSTRATION:'Manifestation', OTHER_CAUSE:'Autre cause', UNKNOWN_CAUSE:null };
  const effectLabels = { NO_SERVICE:'Service supprimé', SIGNIFICANT_DELAYS:'Retards importants', REDUCED_SERVICE:'Service réduit', MODIFIED_SERVICE:'Service modifié', DETOUR:'Déviation', ADDITIONAL_SERVICE:'Service supplémentaire' };

  const alertsHTML = alertsToShow.length ? (() => {
    const withSev = alertsToShow.map(a => {
      const txt = ((a.headerText||'') + ' ' + (a.description||'')).toLowerCase();
      const isDisrupted = a.effect==='SIGNIFICANT_DELAYS'||a.effect==='REDUCED_SERVICE'||a.effect==='MODIFIED_SERVICE'||a.cause==='STRIKE'||a.cause==='ACCIDENT'||a.cause==='TECHNICAL_PROBLEM'||a.cause==='DEMONSTRATION'||a.cause==='WEATHER'||a.cause==='POLICE_ACTIVITY'||a.cause==='MEDICAL_EMERGENCY'||txt.includes('retard')||txt.includes('supprim')||txt.includes('perturbat')||txt.includes('incident')||txt.includes('panne')||txt.includes('grève');
      const effectiveSev = (a.severity==='blocking'||a.effect==='NO_SERVICE') ? 'blocking' : (a.severity==='significant'||isDisrupted) ? 'significant' : 'info';
      return { ...a, effectiveSev };
    });
    const topSev = withSev.some(a=>a.effectiveSev==='blocking')?'blocking':withSev.some(a=>a.effectiveSev==='significant')?'significant':'info';
    const topLabel = {blocking:'⛔ Suppression',significant:'⚠ Perturbation',info:'ℹ Info trafic'}[topSev];
    const topAlert = withSev.find(a=>a.effectiveSev===topSev)||withSev[0];
    const preview = (topAlert.headerText||topAlert.description||'');
    const previewTxt = preview.length > 80 ? preview.slice(0,80)+'…' : preview;
    const uid = 'al_' + Math.random().toString(36).slice(2,7);
    const cards = withSev.map(a => {
      const cause  = causeLabels[a.cause]  ?? null;
      const effect = effectLabels[a.effect] ?? null;
      const label  = [cause,effect].filter(Boolean).join(' · ');
      const title  = a.headerText||label||'Perturbation';
      const desc   = a.description && a.description !== a.headerText ? a.description : null;
      return `<div class="alert-card ${a.effectiveSev}"><div class="alert-cause">${label||'Perturbation'}</div><div class="alert-text">${title}${desc?'<br><span style="opacity:.7;font-size:11px">'+desc+'</span>':''}</div></div>`;
    }).join('');
    return `<div class="alert-section">
      <div class="alert-toggle" onclick="toggleAlerts('${uid}')">
        <div class="alert-toggle-left">
          <span style="color:${topSev==='blocking'?'#FF8A80':topSev==='significant'?'#FFB74D':'#90CAF9'}">${topLabel}</span>
          <span class="alert-toggle-count ${topSev}">${alertsToShow.length} message${alertsToShow.length>1?'s':''}</span>
        </div>
        <span class="alert-chevron" id="chev_${uid}">▼</span>
      </div>
      ${previewTxt?`<div class="alert-preview">${previewTxt}</div>`:''}
      <div class="alert-body" id="${uid}"><div class="alert-body-inner">${cards}</div></div>
    </div>`;
  })() : '';

  const currentSegIdx = pos?.segIdx ?? findCurrentSegment(stops, now);
  const atStationIdx  = findAtStation(stops, now);
  const totalStops    = stops.length;
  const skippedCount  = stops.filter(s => s.scheduleRelationship === 'SKIPPED').length;
  const addedCount    = stops.filter(s => s.scheduleRelationship === 'ADDED').length;
  const servedCount   = totalStops - skippedCount;
  const stopsTitleExtra = [
    skippedCount > 0 ? `<span style="color:var(--red);font-size:11px">${skippedCount} supprimé${skippedCount>1?'s':''}</span>` : '',
    addedCount   > 0 ? `<span style="color:var(--accent);font-size:11px">${addedCount} ajouté${addedCount>1?'s':''}</span>` : '',
  ].filter(Boolean).join(' · ');

  document.getElementById('detBody').innerHTML = alertsHTML + (totalStops
    ? `<div class="stops-title">Arrêts desservis (${servedCount})${stopsTitleExtra ? ' · '+stopsTitleExtra : ''}</div><div class="stops-container">`
      + stops.map((s, i) => {
          const skip  = s.scheduleRelationship === 'SKIPPED';
          const added = s.scheduleRelationship === 'ADDED';
          const isLast = i === totalStops - 1;
          const isAtStation = atStationIdx === i;
          const depS = getStopTime(s,'departure'), arrS = getStopTime(s,'arrival');
          const refTime = depS || arrS;
          const isPassed   = !skip && refTime && refTime.getTime() < now && !isAtStation;
          const isLastLeft = !skip && isPassed && i < totalStops-1 && (() => {
            const nextS = stops[i+1]; if (!nextS) return false;
            const nextArr = getStopTime(nextS,'arrival')||getStopTime(nextS,'departure');
            return nextArr && nextArr.getTime() > now;
          })();
          const dotCls  = skip?'skip':isAtStation?'current':isPassed?'done':'next';
          const nameCls = skip?'skip':isAtStation?'current':isPassed?'done':'';
          let barFill = 0;
          if (!isLast) {
            if (isPassed && !isLastLeft) barFill = 100;
            else if (isLastLeft) {
              const dep = getStopTime(s,'departure')||getStopTime(s,'arrival');
              const arr = stops[i+1]?(getStopTime(stops[i+1],'arrival')||getStopTime(stops[i+1],'departure')):null;
              barFill = (dep&&arr&&arr>dep) ? Math.min(99,Math.max(1,Math.round((now-dep.getTime())/(arr.getTime()-dep.getTime())*100))) : 50;
            }
          }
          const arrTime=getStopTime(s,'arrival'), depTime=getStopTime(s,'departure');
          const arrDelay=s.arrival?.delay?Math.round(s.arrival.delay/60):0;
          const depDelay=s.departure?.delay?Math.round(s.departure.delay/60):0;
          const arrTheo=arrTime&&arrDelay>0?new Date(arrTime.getTime()-s.arrival.delay*1000):null;
          const depTheo=depTime&&depDelay>0?new Date(depTime.getTime()-s.departure.delay*1000):null;
          let dwellHTML='';
          if (depTime&&arrTime&&depTime>arrTime) { const dw=Math.round((depTime-arrTime)/60000); if(dw>0) dwellHTML=`<span class="dwell${isAtStation?' current':''}">${dw} min d'arrêt</span>`; }
          let subHTML='';
          if (skip) subHTML=`<span class="mini-skip">Arrêt supprimé</span>`;
          else if (added) subHTML=`<span class="mini-add">Arrêt ajouté</span>`;
          else {
            if (arrTime) { if(arrTheo) subHTML+=`<span class="st struck">${fmtISO(arrTheo.toISOString())}</span>`; subHTML+=`<span class="st${arrDelay>0?' amended':' time'}">Arrivée: ${fmtISO(arrTime.toISOString())}</span>`; }
            if (depTime) { if(depTheo) subHTML+=`<span class="st struck">${fmtISO(depTheo.toISOString())}</span>`; subHTML+=`<span class="st${depDelay>0?' amended':' time'}">Départ: ${fmtISO(depTime.toISOString())}</span>`; }
            const maxDelay=Math.max(arrDelay,depDelay);
            if (maxDelay>0) subHTML+=`<span class="st late">Retard: +${maxDelay}'</span>`;
            if (dwellHTML) subHTML+=dwellHTML;
            if (isAtStation) subHTML+=`<span class="current-badge">En gare</span>`;
          }
          return `<div class="stop-row${isAtStation?' is-current':''}">
            <div class="stop-tl"><div class="stop-tl-bar"><div class="stop-tl-bar-fill" style="height:${barFill}%"></div></div><div class="stop-dot ${dotCls}"></div></div>
            <div class="stop-info"><div class="stop-name ${nameCls}">${s.stopName||s.stopId||'?'}</div><div class="stop-sub">${subHTML}</div></div>
          </div>`;
        }).join('') + `</div>`
    : `<div class="empty">Pas de détail d'arrêt disponible.</div>`);

  document.getElementById('detailPanel').classList.add('open');
  if (currentSegIdx > 0) {
    requestAnimationFrame(() => {
      const rows = document.querySelectorAll('.stop-row');
      if (rows[currentSegIdx]) rows[currentSegIdx].scrollIntoView({ block:'center', behavior:'smooth' });
    });
  }
}

function findCurrentSegment(stops, now) {
  for (let i = 0; i < stops.length - 1; i++) {
    const dep = getStopTime(stops[i], 'departure');
    const arr = getStopTime(stops[i+1], 'arrival');
    if (dep && arr && now >= dep.getTime() && now <= arr.getTime()) return i;
  }
  for (let i = 0; i < stops.length; i++) {
    const t = getStopTime(stops[i], 'arrival') || getStopTime(stops[i], 'departure');
    if (t && t.getTime() > now) return Math.max(0, i - 1);
  }
  return stops.length - 1;
}

function findAtStation(stops, now) {
  for (let i = 0; i < stops.length; i++) {
    const arr = getStopTime(stops[i], 'arrival');
    const dep = getStopTime(stops[i], 'departure');
    if (arr && dep && now >= arr.getTime() && now <= dep.getTime()) return i;
    if (!arr && dep && now <= dep.getTime() && i === 0) return i;
  }
  return -1;
}

function closeDetail() {
  const panel = document.getElementById('detailPanel');
  panel.style.transform = ''; // retire le transform inline du drag
  panel.classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('visible');
  document.getElementById('detailOverlay').style.opacity = '';
  clearRoutes();
  selId = null;
  document.querySelectorAll('.t-card.selected').forEach(c => c.classList.remove('selected'));
  renderMarkers(filtered());
}

// RECHERCHE desktop
// ══════════════════════════════════════════════════════
const si = document.getElementById('searchInput');
const sd = document.getElementById('searchDd');
si.addEventListener('input', e => {
  clearTimeout(searchTimer);
  const v = e.target.value.trim();
  if (!v) { sd.classList.remove('open'); return; }
  searchTimer = setTimeout(() => doSearch(v, 'desktop'), 300);
});
si.addEventListener('keydown', e => { if (e.key === 'Escape') sd.classList.remove('open'); });
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) sd.classList.remove('open'); });

// Recherche mobile
const msi = document.getElementById('mobSearchInput');
msi.addEventListener('input', e => {
  clearTimeout(mobSearchTimer);
  const v = e.target.value.trim();
  if (!v) { document.getElementById('mobSearchResults').innerHTML = `<div class="empty">Recherche un numéro de train ou une ville</div>`; return; }
  mobSearchTimer = setTimeout(() => doSearch(v, 'mobile'), 300);
});

async function doSearch(q, target) {
  try {
    const r = await fetch(`${PROXY}/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    const results = data.results || [];
    if (target === 'desktop') {
      if (!results.length) {
        sd.innerHTML = `<div class="dd-item" style="color:var(--muted)">Aucun résultat pour « ${q} »</div>`;
      } else {
        sd.innerHTML = results.slice(0,8).map(t => {
          const { delayColor, delayLabel } = statusInfo(t);
          return `<div class="dd-item" onclick="pickResult('${t.id}')">
            <span class="dd-tag tag-${t.type.toLowerCase()}">${t.type}</span>
            <div class="dd-info">
              <div class="dd-num">${t.type} ${t.num} <span style="color:${delayColor};font-size:11px">${delayLabel}</span></div>
              <div class="dd-route">${t.from} → ${t.to}${t.fromTime?' · ↑ '+fmtISO(t.fromTime):''}</div>
            </div>
          </div>`;
        }).join('');
      }
      sd.classList.add('open');
    } else {
      // Mobile : résultats en liste dans le panel recherche
      const el = document.getElementById('mobSearchResults');
      if (!results.length) {
        el.innerHTML = `<div class="empty">Aucun résultat pour « ${q} »</div>`;
      } else {
        el.innerHTML = results.slice(0,12).map(t => {
          const { cls, delayLabel, delayColor } = statusInfo(t);
          const dep = t.fromTime ? fmtISO(t.fromTime) : null;
          const arr = t.toTime   ? fmtISO(t.toTime)   : null;
          return `<div class="t-card ${cls}" onclick="pickResult('${t.id}')">
            <div class="tc-top">
              <span class="tc-num">${t.type}&nbsp;${t.num}</span>
              <span class="tc-type tag-${t.type.toLowerCase()}">${t.type}</span>
              <span class="tc-delay" style="color:${delayColor}">${delayLabel}</span>
            </div>
            <div class="tc-route"><strong>${t.from}</strong> → <strong>${t.to}</strong></div>
            <div class="tc-times">
              ${dep?`<span class="st">Départ:&nbsp;${dep}</span>`:''}
              ${arr?`<span class="st">→ Arrivée:&nbsp;${arr}</span>`:''}
            </div>
          </div>`;
        }).join('');
      }
    }
  } catch(e) { console.error(e); }
}

function pickResult(id) {
  sd.classList.remove('open');
  si.value = '';
  msi.value = '';
  setFilter('all');
  selectTrain(id);
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function statusInfo(t) {
  if (t.rtStatus === 'NO_SERVICE')       return { cls:'cancel', delayLabel:'Supprimé',        delayColor:'var(--grey)' };
  if (t.delay > 20)                      return { cls:'alert',  delayLabel:'+'+t.delay+' min', delayColor:'var(--red)' };
  if (t.delay > 0)                       return { cls:'late',   delayLabel:'+'+t.delay+' min', delayColor:'var(--orange)' };
  if (t.rtStatus === 'MODIFIED_SERVICE') return { cls:'mod',    delayLabel:'Modifié',          delayColor:'var(--blue)' };
  return                                        { cls:'ok',     delayLabel:"À l'heure",        delayColor:'var(--green)' };
}
function mkColor(t) {
  if (t.delay > 20) return { color:'#E30613', glow:'rgba(227,6,19,.22)' };
  if (t.delay > 0)  return { color:'#FF9800', glow:'rgba(255,152,0,.2)' };
  if (t.rtStatus === 'MODIFIED_SERVICE') return { color:'#2196F3', glow:'rgba(33,150,243,.2)' };
  return { color:'#00E676', glow:'rgba(0,230,118,.15)' };
}
function fmtISO(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }); } catch { return iso; }
}
function hhmm() { return new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }); }
function setStatus(html) {
  document.getElementById('statusBar').innerHTML = `<div class="live-dot" style="animation-duration:3s"></div><span>${html}</span>`;
}
function toggleAlerts(uid) {
  const body = document.getElementById(uid);
  const chev = document.getElementById('chev_' + uid);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  if (chev) chev.classList.toggle('open', isOpen);
}

const SPRITE_URL = `data:image/png;base64,${SPRITE_B64}`;

// Grille sprite : 5 col × 3 lignes, cellule 64×64, sprite 320×192
// Colonnes : 0=vert 1=orange 2=rouge 3=bleu 4=gris
// Lignes   : 0=TGV 1=IC 2=TER
const CELL = 64, COLS = 5, ROWS = 3, SW = 320, SH = 192;

function spriteCoords(col, row) {
  return { x: col * CELL, y: row * CELL, width: CELL, height: CELL };
}

function getIconDef(train) {
  const row = train.type === 'TGV' ? 0 : train.type === 'IC' ? 1 : 2;
  let col;
  if (train.rtStatus === 'NO_SERVICE')       col = 2; // rouge
  else if (train.delay > 20)                 col = 2; // rouge
  else if (train.delay > 0)                  col = 1; // orange
  else if (train.rtStatus === 'MODIFIED_SERVICE') col = 3; // bleu
  else                                       col = 0; // vert
  return spriteCoords(col, row);
}

let deckOverlay = null;

function initDeck() {
  if (!map) return;
  const container = map.getContainer();
  // Crée un canvas overlay par-dessus Leaflet
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:500';
  container.appendChild(canvas);

  deckOverlay = new deck.Deck({
    canvas,
    width: '100%',
    height: '100%',
    initialViewState: { longitude: 2.3, latitude: 46.8, zoom: 6 },
    controller: false,
    layers: [],
    onWebGLInitialized: (gl) => {},
  });

  // Relay des clics Leaflet vers deck.gl pour le picking
  map.on('click', function(e) {
    if (!deckOverlay) return;
    const containerPoint = map.latLngToContainerPoint(e.latlng);
    const picked = deckOverlay.pickObject({
      x: containerPoint.x,
      y: containerPoint.y,
      radius: 10,
    });
    if (picked && picked.object) {
      selectTrain(picked.object.train.id);
      L.DomEvent.stop(e);
    }
  });

  // Sync deck.gl avec Leaflet à chaque mouvement de carte
  function syncDeck() {
    if (!deckOverlay || !map) return;
    const c = map.getCenter();
    const z = map.getZoom();
    const size = map.getSize();
    canvas.width  = size.x;
    canvas.height = size.y;
    deckOverlay.setProps({
      width: size.x,
      height: size.y,
      viewState: {
        longitude: c.lng,
        latitude:  c.lat,
        zoom:      z - 1, // deck.gl zoom ≈ Leaflet zoom - 1
        pitch: 0,
        bearing: 0,
      }
    });
  }

  map.on('move',     syncDeck);
  map.on('zoom',     syncDeck);
  map.on('resize',   syncDeck);
  syncDeck();
}

function renderDeckMarkers(list) {
  if (!deckOverlay) return;

  const ICON_SIZE = 48;
  const data = list
    .filter(t => t.rtStatus !== 'NO_SERVICE')
    .map(t => {
      const pos = interpolatePosition(t);
      if (!pos) return null;
      const ic = getIconDef(t);
      return { train: t, pos, ic };
    })
    .filter(Boolean);

  const iconAtlas = SPRITE_URL;
  const iconMapping = {};
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      iconMapping[`${r}_${c}`] = {
        x: c * CELL, y: r * CELL,
        width: CELL, height: CELL,
        anchorX: CELL / 2, anchorY: CELL / 2,
        mask: false
      };
    }
  }

  const iconLayer = new deck.IconLayer({
    id: 'trains',
    data,
    iconAtlas,
    iconMapping,
    getIcon:     d => `${d.ic.y / CELL}_${d.ic.x / CELL}`,
    getPosition: d => [d.pos.lon, d.pos.lat],
    getAngle:    d => -d.pos.bearing,
    getSize:     d => d.train.id === selId ? ICON_SIZE * 1.35 : ICON_SIZE,
    sizeScale:   1,
    sizeUnits:   'pixels',
    pickable:    true,
    onClick:     info => { if (info.object) selectTrain(info.object.train.id); },
    updateTriggers: { getSize: [selId] }
  });

  const textLayer = new deck.TextLayer({
    id: 'trains-labels',
    data,
    getPosition:  d => [d.pos.lon, d.pos.lat],
    getText:      d => d.train.type,
    getSize:      10,
    getColor:     [255, 255, 255, 230],
    fontFamily:   'DM Mono, monospace',
    fontWeight:   '700',
    getTextAnchor:'middle',
    getAlignmentBaseline: 'center',
    sizeUnits:    'pixels',
    pickable:     false,
    getPixelOffset: [0, 1], // léger centrage vertical
  });

  deckOverlay.setProps({ layers: [iconLayer, textLayer] });
}

function clearDeckMarkers() {
  if (deckOverlay) deckOverlay.setProps({ layers: [] });
}


// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
function boot() {
  initMap();
  loadTrains();
  setInterval(loadTrains, REFRESH_MS);
}
</script>
